AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Embrace North - Fitness class booking automation
Parameters:
  JwtSecret:
    Type: String
    NoEcho: true
  EncryptionKey:
    Type: String
    NoEcho: true
  CorsAllowedOrigins:
    Type: String
    Default: '*'
  DomainName:
    Type: String
    Default: embrace.trevor.fail
    Description: Custom domain for the client
  TwilioAccountSid:
    Type: String
    Default: ''
    NoEcho: true
  TwilioAuthToken:
    Type: String
    Default: ''
    NoEcho: true
  TwilioPhoneNumber:
    Type: String
    Default: ''
    Description: Twilio phone number in E.164 format (e.g. +15551234567)
  DeployFrontend:
    Type: String
    Default: 'true'
    AllowedValues:
    - 'true'
    - 'false'
    Description: Set to false to skip CloudFront/S3/ACM (e.g. for ephemeral PR stacks)
  EnableCron:
    Type: String
    Default: 'true'
    AllowedValues:
    - 'true'
    - 'false'
    Description: Set to false to disable the scheduled cron trigger (e.g. for ephemeral
      PR stacks)
Conditions:
  IsFrontendEnabled:
    Fn::Equals:
    - Ref: DeployFrontend
    - 'true'
  IsCronEnabled:
    Fn::Equals:
    - Ref: EnableCron
    - 'true'
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    Environment:
      Variables:
        USERS_TABLE:
          Fn::Sub: ${AWS::StackName}-Users
        APPOINTMENTS_TABLE:
          Fn::Sub: ${AWS::StackName}-Appointments
        JWT_SECRET:
          Ref: JwtSecret
        ENCRYPTION_KEY:
          Ref: EncryptionKey
        CORS_ALLOWED_ORIGINS:
          Ref: CorsAllowedOrigins
Resources:
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: ${AWS::StackName}-Users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      - AttributeName: username
        AttributeType: S
      KeySchema:
      - AttributeName: userId
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: username-index
        KeySchema:
        - AttributeName: username
          KeyType: HASH
        Projection:
          ProjectionType: ALL
  AppointmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName:
        Fn::Sub: ${AWS::StackName}-Appointments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      - AttributeName: appointmentId
        AttributeType: S
      KeySchema:
      - AttributeName: userId
        KeyType: HASH
      - AttributeName: appointmentId
        KeyType: RANGE
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Condition: IsFrontendEnabled
    Properties:
      DomainName:
        Ref: DomainName
      SubjectAlternativeNames:
      - embrace.trevorlitsey.com
      ValidationMethod: DNS
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda.handler
      CodeUri: ApiFunction
      MemorySize: 1600
      Timeout: 60
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: UsersTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: AppointmentsTable
      - Statement:
        - Effect: Allow
          Action: lambda:InvokeFunction
          Resource:
            Fn::GetAtt:
            - CronFunction
            - Arn
      Environment:
        Variables:
          CRON_FUNCTION_NAME:
            Ref: CronFunction
      Events:
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /
            Method: ANY
    Metadata:
      SamResourceId: ApiFunction
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
          Fn::Split:
          - ','
          - Ref: CorsAllowedOrigins
        AllowHeaders:
        - Content-Type
        - Authorization
        AllowMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
  CronFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: CronFunction
      MemorySize: 1600
      Timeout: 120
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: UsersTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: AppointmentsTable
      Environment:
        Variables:
          TWILIO_ACCOUNT_SID:
            Ref: TwilioAccountSid
          TWILIO_AUTH_TOKEN:
            Ref: TwilioAuthToken
          TWILIO_PHONE_NUMBER:
            Ref: TwilioPhoneNumber
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Enabled:
              Fn::If:
              - IsCronEnabled
              - true
              - false
    Metadata:
      SamResourceId: CronFunction
  ClientBucket:
    Type: AWS::S3::Bucket
    Condition: IsFrontendEnabled
    Properties:
      BucketName:
        Fn::Sub: embrace-north-client-${AWS::AccountId}
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
  ClientBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: IsFrontendEnabled
    Properties:
      Bucket:
        Ref: ClientBucket
      PolicyDocument:
        Statement:
        - Sid: AllowCloudFrontAccess
          Effect: Allow
          Principal:
            Service: cloudfront.amazonaws.com
          Action: s3:GetObject
          Resource:
            Fn::Sub: ${ClientBucket.Arn}/*
          Condition:
            StringEquals:
              AWS:SourceArn:
                Fn::Sub: arn:aws:cloudfront::${AWS::AccountId}:distribution/${ClientDistribution}
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Condition: IsFrontendEnabled
    Properties:
      OriginAccessControlConfig:
        Name: EmbraceNorth-OAC
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4
  ClientDistribution:
    Type: AWS::CloudFront::Distribution
    Condition: IsFrontendEnabled
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Aliases:
        - Ref: DomainName
        - embrace.trevorlitsey.com
        ViewerCertificate:
          AcmCertificateArn:
            Ref: Certificate
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
        - Id: S3Origin
          DomainName:
            Fn::GetAtt:
            - ClientBucket
            - RegionalDomainName
          OriginAccessControlId:
            Ref: CloudFrontOAC
          S3OriginConfig:
            OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false
        CustomErrorResponses:
        - ErrorCode: 403
          ResponseCode: 200
          ResponsePagePath: /index.html
        - ErrorCode: 404
          ResponseCode: 200
          ResponsePagePath: /index.html
Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value:
      Fn::Sub: https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
  ClientBucketName:
    Condition: IsFrontendEnabled
    Description: S3 bucket for client files
    Value:
      Ref: ClientBucket
  ClientDistributionUrl:
    Condition: IsFrontendEnabled
    Description: CloudFront URL for the client
    Value:
      Fn::Sub: https://${ClientDistribution.DomainName}
  ClientDistributionId:
    Condition: IsFrontendEnabled
    Description: CloudFront distribution ID
    Value:
      Ref: ClientDistribution
  CloudFrontDomain:
    Condition: IsFrontendEnabled
    Description: CloudFront domain name (for DNS CNAME)
    Value:
      Fn::GetAtt:
      - ClientDistribution
      - DomainName
  CertificateArn:
    Condition: IsFrontendEnabled
    Description: ACM certificate ARN
    Value:
      Ref: Certificate
