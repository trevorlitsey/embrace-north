AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Embrace North - Fitness class booking automation
Parameters:
  JwtSecret:
    Type: String
    NoEcho: true
  EncryptionKey:
    Type: String
    NoEcho: true
  CorsAllowedOrigins:
    Type: String
    Default: '*'
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    Environment:
      Variables:
        USERS_TABLE:
          Ref: UsersTable
        APPOINTMENTS_TABLE:
          Ref: AppointmentsTable
        JWT_SECRET:
          Ref: JwtSecret
        ENCRYPTION_KEY:
          Ref: EncryptionKey
        CORS_ALLOWED_ORIGINS:
          Ref: CorsAllowedOrigins
Resources:
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: EmbraceNorth-Users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      - AttributeName: username
        AttributeType: S
      KeySchema:
      - AttributeName: userId
        KeyType: HASH
      GlobalSecondaryIndexes:
      - IndexName: username-index
        KeySchema:
        - AttributeName: username
          KeyType: HASH
        Projection:
          ProjectionType: ALL
  AppointmentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: EmbraceNorth-Appointments
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
      - AttributeName: userId
        AttributeType: S
      - AttributeName: appointmentId
        AttributeType: S
      KeySchema:
      - AttributeName: userId
        KeyType: HASH
      - AttributeName: appointmentId
        KeyType: RANGE
  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: lambda.handler
      CodeUri: ApiFunction
      MemorySize: 1600
      Timeout: 60
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: UsersTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: AppointmentsTable
      Events:
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /{proxy+}
            Method: ANY
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: HttpApi
            Path: /
            Method: ANY
    Metadata:
      SamResourceId: ApiFunction
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      CorsConfiguration:
        AllowOrigins:
        - '*'
        AllowHeaders:
        - Content-Type
        - Authorization
        AllowMethods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
  CronFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: handler.handler
      CodeUri: CronFunction
      MemorySize: 1600
      Timeout: 120
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: UsersTable
      - DynamoDBCrudPolicy:
          TableName:
            Ref: AppointmentsTable
      - Statement:
        - Effect: Allow
          Action:
          - sns:Publish
          Resource: '*'
      Events:
        ScheduleEvent:
          Type: Schedule
          Properties:
            Schedule: rate(5 minutes)
            Enabled: true
    Metadata:
      SamResourceId: CronFunction
  ClientBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: embrace-north-client-${AWS::AccountId}
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html
  ClientBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: ClientBucket
      PolicyDocument:
        Statement:
        - Sid: AllowCloudFrontAccess
          Effect: Allow
          Principal:
            Service: cloudfront.amazonaws.com
          Action: s3:GetObject
          Resource:
            Fn::Sub: ${ClientBucket.Arn}/*
          Condition:
            StringEquals:
              AWS:SourceArn:
                Fn::Sub: arn:aws:cloudfront::${AWS::AccountId}:distribution/${ClientDistribution}
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: EmbraceNorth-OAC
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4
  ClientDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
        - Id: S3Origin
          DomainName:
            Fn::GetAtt:
            - ClientBucket
            - RegionalDomainName
          OriginAccessControlId:
            Ref: CloudFrontOAC
          S3OriginConfig:
            OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false
        CustomErrorResponses:
        - ErrorCode: 403
          ResponseCode: 200
          ResponsePagePath: /index.html
        - ErrorCode: 404
          ResponseCode: 200
          ResponsePagePath: /index.html
Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value:
      Fn::Sub: https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
  ClientBucketName:
    Description: S3 bucket for client files
    Value:
      Ref: ClientBucket
  ClientDistributionUrl:
    Description: CloudFront URL for the client
    Value:
      Fn::Sub: https://${ClientDistribution.DomainName}
  ClientDistributionId:
    Description: CloudFront distribution ID
    Value:
      Ref: ClientDistribution
