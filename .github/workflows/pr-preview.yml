name: PR Preview

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  STACK_NAME: embrace-north-pr-${{ github.event.pull_request.number }}

jobs:
  deploy:
    name: Deploy preview
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: aws-actions/setup-sam@v2

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: SAM build
        run: sam build

      - name: SAM deploy
        run: |
          sam deploy \
            --config-env pr \
            --stack-name ${{ env.STACK_NAME }} \
            --no-confirm-changeset \
            --parameter-overrides \
              "JwtSecret=${{ secrets.JWT_SECRET }} \
               EncryptionKey=${{ secrets.ENCRYPTION_KEY }} \
               TwilioAccountSid=${{ secrets.TWILIO_ACCOUNT_SID }} \
               TwilioAuthToken=${{ secrets.TWILIO_AUTH_TOKEN }} \
               TwilioPhoneNumber=${{ vars.TWILIO_PHONE_NUMBER }} \
               DeployFrontend=false \
               EnableCron=false \
               CorsAllowedOrigins=*"

      - name: Get stack outputs
        id: stack
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.STACK_NAME }} \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT

      - name: Post preview comment
        uses: actions/github-script@v7
        with:
          script: |
            const apiUrl = '${{ steps.stack.outputs.api_url }}';
            const stackName = '${{ env.STACK_NAME }}';
            const sha = context.payload.pull_request.head.sha.slice(0, 7);

            const body = [
              '## 🚀 Preview environment deployed',
              '',
              `| | |`,
              `|---|---|`,
              `| **API URL** | \`${apiUrl}\` |`,
              `| **Stack** | \`${stackName}\` |`,
              `| **Commit** | \`${sha}\` |`,
              '',
              '> ℹ️ Run the client locally with `REACT_APP_API_URL=' + apiUrl + ' npm start`',
              '> Cron is disabled in preview envs. Tables are isolated per PR.',
            ].join('\n');

            // Upsert: find existing bot comment and update it, or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview environment deployed')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

  teardown:
    name: Teardown preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete stack
        run: |
          aws cloudformation delete-stack --stack-name ${{ env.STACK_NAME }}
          aws cloudformation wait stack-delete-complete --stack-name ${{ env.STACK_NAME }} || true
          echo "Stack ${{ env.STACK_NAME }} deleted"

      - name: Post teardown comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: '🧹 Preview environment `${{ env.STACK_NAME }}` has been torn down.',
            });
